version: '3.8'

services:
  web:
    build: .
    container_name: url-shortener
    ports:
      - "5000:5000"
    volumes:
      # Persist database outside container so data survives restarts
      - ./data:/app/instance
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
